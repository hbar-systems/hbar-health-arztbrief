# hbar.health — Arztbrief app — brain-app manifest
#
# The letter-writing app: structured anamnesis input -> draft Arztbrief.
# Converted from the standalone Vite SPA in this repo. Installs into a brain
# via Settings -> Apps (paste this repo's public GitHub URL -> Approve).
#
# Schema: registry/schema/brain/app.schema.json (in hbar.world)
# Created: 2026-05-18
#
# REQUIRES the `llm.complete` bridge intent (Route A) in brainfoundry-nous.
# Until that ships + the brain is redeployed, the app installs and renders
# but draft generation returns permission_denied.

dialect: brain-app/v1
id: hbar-health-arztbrief
name: Arztbrief
version: 0.4.0
description: Strukturierte Anamnese-Eingabe → Arztbrief-Entwurf in formellem Deutsch, klar als ENTWURF gekennzeichnet. Nur Entwurf — ärztliche Prüfung und Freigabe erforderlich.
license: AGPL-3.0

author:
  name: hbar
  url: https://hbar.systems
  contact: hello@hbar.systems

repo: https://github.com/hbar-systems/hbar-health-arztbrief

tab:
  label: Arztbrief
  route: /arztbrief
  order: 30

entries:
  ui_bundle: dist/

# The app asks the brain to generate the draft via the `llm.complete` bridge
# intent. That intent RAG-retrieves over the read-mode layers declared below, so
# the draft draws on the practice corpus — patient histories, Leitlinien,
# protocols. `memory.write` lets "Entwurf speichern" append the finished draft
# back into the episodic layer (append mode = audit-friendly, no overwrite).
# Until the brain re-approves this manifest at install/update, the save button
# falls back to localStorage.
permissions:
  - llm.invoke
  - memory.write

requires_layers:
  - layer: semantic
    mode: read
  - layer: episodic
    mode: read
  - layer: episodic
    mode: append

requires_endpoints:
  - POST /chat/rag

engines:
  brainfoundry-nous: ">=0.8.4"
